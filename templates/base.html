<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashProducts</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kiwi: {
                            DEFAULT: '#00E467', // Verde vibrante para conversão
                            dark: '#00C85A',
                        },
                        dark: '#111827'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 antialiased flex flex-col min-h-screen">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                
                <div class="flex items-center space-x-10">
                    <a href="/" class="text-2xl font-extrabold tracking-tight text-dark flex items-center">
                        Flash<span class="text-kiwi">Products</span>
                    </a>
                    <nav class="hidden md:flex space-x-4">
                        <a href="/" class="px-4 py-2 rounded-full text-sm font-semibold transition-all {{ 'bg-gray-100 text-dark shadow-sm' if not current_category else 'text-gray-500 hover:text-dark hover:bg-gray-50' }}">
                            Tudo
                        </a>
                        <a href="/categoria/programacao" class="px-4 py-2 rounded-full text-sm font-semibold transition-all {{ 'bg-gray-100 text-dark shadow-sm' if current_category == 'programacao' else 'text-gray-500 hover:text-dark hover:bg-gray-50' }}">
                            Programação
                        </a>
                        <a href="/categoria/educacao" class="px-4 py-2 rounded-full text-sm font-semibold transition-all {{ 'bg-gray-100 text-dark shadow-sm' if current_category == 'educacao' else 'text-gray-500 hover:text-dark hover:bg-gray-50' }}">
                            Educação
                        </a>
                    </nav>
                </div>

                <div class="flex items-center space-x-6">
                    {% if logado %}
                        <div class="hidden sm:flex flex-col text-right">
                            <span class="text-[10px] uppercase font-bold text-gray-400 tracking-widest">Bem-vindo</span>
                            <span class="text-sm font-bold text-gray-800">{{ name }}</span>
                        </div>
                        <a href="/logout" class="flex items-center gap-2 bg-red-50 text-red-600 hover:bg-red-600 hover:text-white px-4 py-2 rounded-xl text-sm font-bold transition-all border border-red-100 shadow-sm">
                            <i class="bi bi-box-arrow-right"></i> Sair
                        </a>
                    {% else %}
                        <a href="/login" class="flex items-center gap-2 bg-kiwi hover:bg-kiwi-dark text-dark px-6 py-2.5 rounded-xl text-sm font-bold transition-all shadow-lg shadow-kiwi/20 active:scale-95">
                            <i class="bi bi-person-circle"></i> Fazer Login
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-200 py-10">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-400 text-sm font-medium">
                &copy; 2026 - <span class="text-dark font-bold">FlashProducts</span> - Todos os direitos reservados.
            </p>
        </div>
    </footer>

    <script>
        console.log('FlashProducts: Interface carregada com Tailwind CSS.');
    </script>
</body>
</html>
