{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 bg-gray-50">
    <div class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl border border-gray-100 p-8 md:p-10">
        
        <div class="mb-10 flex items-center gap-4">
            <div class="w-12 h-12 bg-kiwi/10 rounded-2xl flex items-center justify-center">
                <i class="bi bi-plus-circle-fill text-kiwi text-2xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-extrabold text-dark">Cadastrar Novo Produto</h1>
                <p class="text-gray-400 text-sm">Adicione um novo infoproduto à vitrine.</p>
            </div>
        </div>

        <form action="/admin/add-product" method="POST" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Nome do Produto</label>
                    <input type="text" name="name" placeholder="Ex: Master em Python" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 focus:border-kiwi outline-none transition-all font-medium" required>
                </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Categoria</label>
                <select name="category" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 focus:border-kiwi outline-none transition-all font-medium cursor-pointer">
                        {% for category in categoria %}
                        <option value="{{ category }}">{{ category }}</option>
                        {% endfor %}
                </select>
            </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-2 space-y-2">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">URL da Imagem</label>
                    <input type="url" name="image_url" placeholder="https://..." class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 focus:border-kiwi outline-none transition-all font-medium" required>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Preço (R$)</label>
                    <input type="number" step="0.01" name="price" placeholder="0,00" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 focus:border-kiwi outline-none transition-all font-bold text-dark" required>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Descrição Curta</label>
                <textarea name="description" rows="3" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 focus:border-kiwi outline-none transition-all font-medium resize-none" required></textarea>
            </div>

            <button type="submit" class="w-full bg-kiwi hover:bg-kiwi-dark text-dark font-black py-4 rounded-2xl transition-all shadow-lg shadow-kiwi/20 active:scale-[0.98] uppercase tracking-wider">
                Publicar Produto
            </button>
        </form>
    </div>
</div>
{% endblock %}
