{% extends 'base.html' %}

{% block content %}
<div class="mb-10 text-center md:text-left">
    <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Produtos em Destaque</h1>
    <p class="text-gray-500 mt-2">Os melhores infoprodutos para alavancar sua carreira.</p>
</div>

<section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
    
    {% for product in products %}
    <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden hover:shadow-xl hover:-translate-y-1.5 transition-all duration-300 flex flex-col group">
        
        <div class="relative h-48 w-full overflow-hidden bg-gray-100">
            <img src="{{ product.image_url }}" alt="{{ product.name }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
            
            <div class="absolute top-3 left-3">
                <span class="bg-white/90 backdrop-blur-sm text-gray-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider shadow-sm">
                    {{ product.category }}
                </span>
            </div>
        </div>

        <div class="p-6 flex flex-col flex-grow">
            <h2 class="text-lg font-bold text-gray-900 mb-2 leading-tight line-clamp-2">
                {{ product.name }}
            </h2>
            <p class="text-gray-500 text-sm mb-6 flex-grow line-clamp-3">
                {{ product.description }}
            </p>
            
            <div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-100">
                <div class="flex flex-col">
                    <span class="text-xs text-gray-400 font-medium uppercase tracking-wide">Por apenas</span>
                    <span class="text-2xl font-extrabold text-gray-900">R$ {{ product.price }}</span>
                </div>
                
                <a href="/checkout/{{ product.id }}" class="bg-kiwi hover:bg-kiwi-hover text-dark font-bold py-2.5 px-5 rounded-xl transition-all duration-200 shadow-[0_4px_14px_0_rgba(0,228,103,0.39)] hover:shadow-[0_6px_20px_rgba(0,228,103,0.23)] hover:-translate-y-0.5 active:translate-y-0">
                    Comprar
                </a>
            </div>
        </div>
    </div>
    {% endfor %}

</section>
{% endblock %}
